server:
  port: 8082
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:esport}
    username: ${DB_USER:esport}
    password: ${DB_PASSWORD:esport_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd

app:
  jwt:
    secret: ${JWT_SECRET:my-very-long-secret-key-for-development-only-32ch}
    access-expiration-ms: 900000
    refresh-expiration-ms: 604800000

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5180}

minio:
  url: ${MINIO_URL:http://localhost:9010}
  access-key: ${MINIO_ACCESS:minioadmin}
  secret-key: ${MINIO_SECRET:minioadmin}
  bucket: esport-documents

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
