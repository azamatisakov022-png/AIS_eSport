version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: esport-db
    environment:
      POSTGRES_DB: esport
      POSTGRES_USER: ${DB_USER:-esport}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-esport_secret}
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-esport}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: esport-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esport-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: esport
      DB_USER: ${DB_USER:-esport}
      DB_PASSWORD: ${DB_PASSWORD:-esport_secret}
      MINIO_URL: http://minio:9000
      MINIO_ACCESS: ${MINIO_USER:-minioadmin}
      MINIO_SECRET: ${MINIO_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-this-key-must-be-at-least-32-chars}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5180,https://ais-e-sport.vercel.app}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
